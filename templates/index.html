<!DOCTYPE html>
<html>
<head>
 <title>Expense Tracker</title>
 <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>
<body>
 <h1>Welcome to Expense Tracker</h1>
 <form method="POST" action="/add">
  <input type="text" name="title" placeholder="Enter title">
  <br><br>
  <input type="number" step="0.01" name="amount" placeholder="Enter amount">
  <br><br>
  <input type="text" name="category" placeholder="Enter category">
  <br><br>
  <button type="submit">Add Expense</button>
 </form>
 <br><br>
 <form method="GET">
  <input type="text" name="search" placeholder="Search expense">
  <button type="submit">Search</button>
 </form>
 <table border="1">
 <tr>
  <th>ID</th>
  <th>Title</th>
  <th>Amount</th>
  <th>Category</th>
  <th>Action</th>
  <th>Edit</th>
 </tr>
 {% for row in expenses %}
 <tr>
  <td>{{row[0] }}</td>
  <td>{{row[1] }}</td>
  <td>{{row[2] }}</td>
  <td>{{row[3] }}</td>
  <td> <a href="/delete/{{ row[0] }}">DELETE</a></td>
  <td> <a href="/edit/{{ row[0] }}">EDIT</a></td>
 </tr>
 {% endfor %}
 </table>
 <br>
 <h2>Total Expense: {{total}}</h2>
 <h2>Category Summary</h2>
 <table border="1">
 <tr>
  <th>Category</th>
  <th>Total</th>
 </tr>
 {% for row in summary %}
 <tr>
  <td>{{ row[0] }}</td>
  <td>{{ row[1] }}</td>
 </tr>
 {% endfor %}
 </table>
</body>
</html>
